; ============================================================
; PJSIP Configuration — Asterisk VoIP PBX
; Интеллектуальная система рекомендаций QoP
; ============================================================
; ВАЖНО: AOR ID должен совпадать с username в SIP REGISTER
; (иначе Asterisk вернёт 404 Not Found после успешной auth)
; ============================================================

; --- Транспорт UDP ---

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=YOUR_PUBLIC_IP
external_signaling_address=YOUR_PUBLIC_IP
local_net=192.168.0.0/16
local_net=10.0.0.0/8
local_net=172.16.0.0/12

; --- Шаблоны ---

[endpoint-template](!)
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=opus
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[auth-template](!)
type=auth
auth_type=userpass

[aor-template](!)
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=30

; ============================================================
; Абоненты (username = endpoint ID = AOR ID — обязательно!)
; ============================================================

; === Абонент 1001 (LAN — локальная сеть) ===
[1001](endpoint-template)
auth=auth1001
aors=1001
callerid="LAN User" <1001>

[auth1001](auth-template)
username=1001
password=test1234

[1001](aor-template)

; === Абонент 1002 (WAN — мобильный) ===
[1002](endpoint-template)
auth=auth1002
aors=1002
callerid="WAN Mobile" <1002>

[auth1002](auth-template)
username=1002
password=test1234

[1002](aor-template)

; === Абонент 1003 (WAN — публичный Wi-Fi) ===
[1003](endpoint-template)
auth=auth1003
aors=1003
callerid="WAN WiFi" <1003>

[auth1003](auth-template)
username=1003
password=test1234

[1003](aor-template)

; === Абонент 1004 (LAN — доверенный) ===
[1004](endpoint-template)
auth=auth1004
aors=1004
callerid="LAN Trusted" <1004>

[auth1004](auth-template)
username=1004
password=test1234

[1004](aor-template)
