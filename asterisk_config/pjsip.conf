; ============================================================
; PJSIP Configuration — Asterisk VoIP PBX
; Интеллектуальная система рекомендаций QoP
; ============================================================

; --- Глобальные настройки транспортов ---

; UDP транспорт (стандартный, без шифрования)
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; NAT traversal
external_media_address=YOUR_PUBLIC_IP
external_signaling_address=YOUR_PUBLIC_IP
local_net=192.168.0.0/16
local_net=10.0.0.0/8
local_net=172.16.0.0/12

; TLS транспорт (шифрование сигнализации)
[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/asterisk/keys/asterisk.pem
priv_key_file=/etc/asterisk/keys/asterisk.key
method=tlsv1_2
external_media_address=YOUR_PUBLIC_IP
external_signaling_address=YOUR_PUBLIC_IP
local_net=192.168.0.0/16
local_net=10.0.0.0/8
local_net=172.16.0.0/12

; --- Шаблон для абонентов ---

[endpoint-template](!)
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=opus
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
ice_support=yes
; STUN для NAT traversal
media_use_received_transport=yes

[auth-template](!)
type=auth
auth_type=userpass

[aor-template](!)
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=30

; --- Абонент 1001 (LAN — локальная сеть) ---

[1001](endpoint-template)
auth=1001-auth
aors=1001-aor
callerid="LAN User" <1001>

[1001-auth](auth-template)
username=1001
password=SecurePass1001!

[1001-aor](aor-template)

; --- Абонент 1002 (WAN — внешний, мобильный) ---

[1002](endpoint-template)
auth=1002-auth
aors=1002-aor
callerid="WAN Mobile" <1002>

[1002-auth](auth-template)
username=1002
password=SecurePass1002!

[1002-aor](aor-template)

; --- Абонент 1003 (WAN — публичный Wi-Fi) ---

[1003](endpoint-template)
auth=1003-auth
aors=1003-aor
callerid="WAN WiFi" <1003>

[1003-auth](auth-template)
username=1003
password=SecurePass1003!

[1003-aor](aor-template)

; --- Абонент 1004 (LAN — доверенный) ---

[1004](endpoint-template)
auth=1004-auth
aors=1004-aor
callerid="LAN Trusted" <1004>

[1004-auth](auth-template)
username=1004
password=SecurePass1004!

[1004-aor](aor-template)
