; ============================================================
; AMI (Asterisk Manager Interface) Configuration
; Используется службой мониторинга для сбора RTCP-телеметрии
; ============================================================

[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0

; Аккаунт для службы мониторинга
[monitor]
secret = monitor_secret
deny = 0.0.0.0/0.0.0.0
permit = 127.0.0.1/255.255.255.0
permit = 192.168.0.0/255.255.0.0
read = system,call,reporting,cdr
write = system,command
writetimeout = 5000
