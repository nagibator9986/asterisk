; ============================================================
; Dialplan — маршрутизация вызовов
; ============================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]

[internal]
; Прямой вызов абонента по номеру
exten => _1XXX,1,NoOp(Incoming call to ${EXTEN} from ${CALLERID(num)})
 same => n,Set(CDR(userfield)=qop_monitored)
 same => n,Dial(PJSIP/${EXTEN},30,tT)
 same => n,Hangup()

; Конференц-комната для тестирования
exten => 8000,1,NoOp(Conference Room)
 same => n,ConfBridge(main_conference)
 same => n,Hangup()

; Echo-тест (проверка качества связи)
exten => 9999,1,NoOp(Echo Test)
 same => n,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()
